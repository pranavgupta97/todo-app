spring:
  application:
    name: todo-app

  # When no profile is explicitly set (e.g. local `spring-boot:run`), behave as if 'dev' is active.
  # Tests override via @ActiveProfiles("test"); prod sets SPRING_PROFILES_ACTIVE=prod.
  profiles:
    default: dev

  jpa:
    hibernate:
      # Flyway owns the schema. Hibernate must never auto-mutate it — only verify
      # that entities match the migrated schema at startup.
      ddl-auto: validate
    # Disable Open-Session-In-View: transactions end when the service layer returns.
    # OSIV leaks DB connections to the view layer and is an anti-pattern.
    open-in-view: false

  flyway:
    enabled: true

  # Docker Compose integration is off by default. The 'dev' profile turns it on so
  # local `./mvnw spring-boot:run` auto-starts the Postgres defined in compose.yaml.
  docker:
    compose:
      enabled: false

  # OIDC / OAuth2 client config. Spring auto-supplies issuer URI, JWK URI,
  # and standard scopes for the well-known "google" provider — we only need
  # to wire client-id and client-secret. Both come from env vars (see
  # backend/.env.example); empty defaults mean the app still starts but
  # login won't succeed until the vars are set.
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
            scope:
              - openid
              - profile
              - email

# Application-specific settings (prefixed `app.` to avoid colliding with
# Spring's own configuration keys).
app:
  security:
    csrf:
      # CSRF is on by default — applies to base/test/prod. The dev profile
      # overrides this to false for ergonomic .http-file-based API testing
      # (see SecurityConfig javadoc).
      enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState

logging:
  level:
    root: INFO
    com.pranavgupta.todoapp: INFO
