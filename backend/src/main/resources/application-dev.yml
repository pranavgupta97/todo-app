# Active locally when running `./mvnw spring-boot:run` (dev is the default profile).
# Spring Boot's Docker Compose support reads the file path below and starts/stops
# the Postgres container alongside the JVM. The DataSource is wired automatically
# from the running container — no JDBC URL hard-coded here.
#
# Path is relative to the JVM's working directory, which is `backend/` when
# running via the Maven wrapper. From `backend/`, `../infra/docker-compose.dev.yml`
# resolves to the project-root infra file.

spring:
  docker:
    compose:
      enabled: true
      lifecycle-management: start-and-stop
      file: ../infra/docker-compose.dev.yml
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.pranavgupta.todoapp: DEBUG
    org.hibernate.SQL: DEBUG
    # Parameter binding — useful while debugging specific SQL statements
    org.hibernate.orm.jdbc.bind: TRACE

# Disable CSRF in dev so manual API testing via backend/requests/todos.http
# only needs a JSESSIONID cookie (no X-XSRF-TOKEN header dance). On localhost
# there are no cross-site attackers, so CSRF adds friction with no security
# benefit. Tests run against the base config (CSRF on); prod has CSRF on too,
# and the React frontend (Phase 11) handles the token echo automatically.
app:
  security:
    csrf:
      enabled: false
